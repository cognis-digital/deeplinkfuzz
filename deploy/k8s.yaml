apiVersion: apps/v1
kind: Deployment
metadata: { name: deeplinkfuzz, labels: { app: deeplinkfuzz } }
spec:
  replicas: 1
  selector: { matchLabels: { app: deeplinkfuzz } }
  template:
    metadata: { labels: { app: deeplinkfuzz } }
    spec:
      containers:
        - name: deeplinkfuzz
          image: ghcr.io/cognis-digital/deeplinkfuzz:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: deeplinkfuzz }
spec:
  selector: { app: deeplinkfuzz }
  ports: [{ port: 80, targetPort: 8000 }]
